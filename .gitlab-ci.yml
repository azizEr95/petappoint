image: node:latest

stages:
  - build-backend
  - build-frontend
  #- test
  - e2e-test
  - deploy

build-backend:
  stage: build-backend
  before_script:
    - cd backend
  script:
    - npm install
  cache:
    paths:
      - backend/node_modules/

build-frontend:
  stage: build-frontend
  before_script:
    - cd frontend
  script:
    - npm install
  cache:
    paths:
      - frontend/node_modules/

